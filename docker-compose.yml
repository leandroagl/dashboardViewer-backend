services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ondra

  backend:
    build: .
    container_name: ondra-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres   # override: dentro de Docker el host es el nombre del servicio
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ondra

  frontend:
    build: ../dashboardViewer-frontend
    restart: unless-stopped
    ports:
      - "7695:7695"
      - "80:80"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro   # certificado SSL del host
    networks:
      - ondra
    depends_on:
      - backend

networks:
  ondra:
    driver: bridge

volumes:
  postgres_data:
