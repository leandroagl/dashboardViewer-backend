services:

  backend:
    build: .
    restart: unless-stopped
    env_file: .env
    networks:
      - ondra
    extra_hosts:
      - "host.docker.internal:host-gateway"   # acceso a PostgreSQL en el host

  frontend:
    build: ../dashboardViewer-frontend
    restart: unless-stopped
    ports:
      - "7695:7695"
      - "80:80"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro   # certificado SSL del host
    networks:
      - ondra
    depends_on:
      - backend

networks:
  ondra:
    driver: bridge
